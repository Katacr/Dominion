schema-version: 1
Title: '&0Guest Flags: {route.dominion.name}'
Layout:
  - '#########'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  'e':
    source: entries
    Display:
      material: '{entry.material}'
      name: '&e[{entry.state}] &f{entry.name}'
      lore:
        - '&7{entry.description}'
        - '&eClick to toggle'
    Empty-Display:
      material: BARRIER
      name: '&7No guest flags are enabled.'
    Clicks:
      left:
        action-group: toggle-guest-flag
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&aPrevious Page'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&cBack to Dominion Management'
    Clicks:
      left:
        action-group: back-dominion-manage
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&aNext Page'
    Clicks:
      left:
        action-group: next-page
