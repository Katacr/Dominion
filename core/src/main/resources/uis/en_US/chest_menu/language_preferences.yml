schema-version: 1
Title: '&0Language'
Layout:
  - '#########'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  'e':
    source: entries
    Display:
      material: WRITABLE_BOOK
      name: '&f{entry.name}'
      lore:
        - '&eClick to select this language'
    Empty-Display:
      material: BARRIER
      name: '&7No menu languages are available.'
    Clicks:
      left:
        action-group: select-language
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&aPrevious'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&cBack'
    Clicks:
      left:
        action-group: back
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&aNext'
    Clicks:
      left:
        action-group: next-page
