schema-version: 1
Title: '&0Add Member: {route.dominion.name}'
Layout:
  - '#########'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  'e':
    source: entries
    Display:
      material: PLAYER_HEAD
      name: '&f{entry.name}'
      lore:
        - '&eClick to add member'
    Empty-Display:
      material: BARRIER
      name: '&7No candidate players are available.'
    Clicks:
      left:
        action-group: add-member
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&aPrevious Page'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&cBack to Member List'
    Clicks:
      left:
        action-group: back-member-list
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&aNext Page'
    Clicks:
      left:
        action-group: next-page
