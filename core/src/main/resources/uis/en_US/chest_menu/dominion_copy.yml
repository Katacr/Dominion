schema-version: 1
Title: '&0Copy Source: {route.dominion.name}'
Layout:
  - '#########'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  'e':
    source: entries
    Display:
      material: CHEST
      name: '&f{entry.name}'
      lore:
        - '&eClick to copy settings'
    Empty-Display:
      material: BARRIER
      name: '&7No source dominions are available.'
    Clicks:
      left:
        action-group: copy
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&aPrevious Page'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&cBack to Copy Settings'
    Clicks:
      left:
        action-group: back
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&aNext Page'
    Clicks:
      left:
        action-group: next-page
