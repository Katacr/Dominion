schema-version: 1
Title: '&0Your Dominions {page.current}/{page.total}'
Layout:
  - '#########'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  'e':
    source: entries
    Display:
      material: PAPER
      name: '&f{entry.prefix}{entry.name}'
    Empty-Display:
      material: BARRIER
      name: '&7No dominions are available.'
    Clicks:
      left:
        action-group: manage-dominion
      right:
        action-group: teleport-dominion
      shift-left:
        action-group: delete-dominion
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&aPrevious Page'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&cBack to Main Menu'
    Clicks:
      left:
        action-group: back-main
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&aNext Page'
    Clicks:
      left:
        action-group: next-page
