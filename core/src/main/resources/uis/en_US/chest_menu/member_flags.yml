schema-version: 1
Title: '&0Member: {route.member.name}'
Layout:
  - '#t#######'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  't':
    Display:
      material: WRITABLE_BOOK
      name: '&aApply Template'
    Clicks:
      left:
        action-group: select-template
  'e':
    source: entries
    Display:
      material: '{entry.material}'
      name: '&e[{entry.state}] &f{entry.name}'
      lore:
        - '&7{entry.description}'
        - '&eClick to toggle'
    Empty-Display:
      material: BARRIER
      name: '&7No member flags are enabled.'
    Clicks:
      left:
        action-group: toggle-member-flag
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&aPrevious Page'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&cBack to Member List'
    Clicks:
      left:
        action-group: back-member-list
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&aNext Page'
    Clicks:
      left:
        action-group: next-page
