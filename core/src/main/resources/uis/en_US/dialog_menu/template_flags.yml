schema-version: 1
Title: '&6Template: {route.template.name} {page.current}/{page.total}'
Settings:
  can_escape: true
  after_action: NONE
Dynamic:
  source: entries
  page-size: 10
  empty: '&7No template flags are available.'
  layout: '&e[{entry.state}] &f{entry.name}: &7{entry.description} {toggle-template-flag}'
  width: 520
  buttons:
    toggle-template-flag:
      text: '&a[Toggle]'
      tooltip: '&7Toggle this template flag'
      action-group: toggle-template-flag
Bottom:
  type: multi
  columns: 2
  buttons:
    rename:
      text: '&eRename Template'
      action-group: rename-template
      input-capture:
        title: '&eRename Template'
        body: '&7Enter a new name for this template.'
        input:
          key: template_new_name
          type: input
          text: '&fNew Name'
          default: '{route.template.name}'
          min_length: 1
          max_length: 64
          pattern: '\S+'
        confirm:
          text: '&aSave'
        deny:
          text: '&cCancel'
    previous:
      text: '&aPrevious'
      action-group: previous-page
    next:
      text: '&aNext'
      action-group: next-page
    back:
      text: '&cBack to Templates'
      action-group: back-template-list
  exit:
    text: '&8Close'
    actions:
      - 'close'
