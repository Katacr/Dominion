schema-version: 1
Title: '&6Select Copy Source {page.current}/{page.total}'
Settings:
  can_escape: true
  after_action: NONE
Dynamic:
  source: entries
  page-size: 12
  empty: '&7No source dominions are available.'
  layout: '&f{entry.name} {copy}'
  width: 420
  buttons:
    copy:
      text: '&a[Copy]'
      action-group: copy
Bottom:
  type: multi
  columns: 2
  buttons:
    previous:
      text: '&aPrevious'
      action-group: previous-page
    next:
      text: '&aNext'
      action-group: next-page
    back:
      text: '&cBack to Copy Menu'
      action-group: back
  exit:
    text: '&8Close'
    actions:
      - 'close'
