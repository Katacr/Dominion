schema-version: 1
Title: '&6Add Member: {route.dominion.name} {page.current}/{page.total}'
Settings:
  can_escape: true
  after_action: NONE
Dynamic:
  source: entries
  page-size: 12
  empty: '&7No players can be added.'
  layout: '&f{entry.name} {add}'
  width: 400
  buttons:
    add:
      text: '&a[Add]'
      tooltip: '&7Add this player as a member'
      action-group: add-member
Bottom:
  type: multi
  columns: 2
  buttons:
    previous:
      text: '&aPrevious'
      action-group: previous-page
    next:
      text: '&aNext'
      action-group: next-page
    back:
      text: '&cBack to Members'
      action-group: back-member-list
  exit:
    text: '&8Close'
    actions:
      - 'close'
