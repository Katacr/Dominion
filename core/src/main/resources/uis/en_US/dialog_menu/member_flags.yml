schema-version: 1
Title: '&6Member Flags: {route.member.name} {page.current}/{page.total}'
Settings:
  can_escape: true
  after_action: NONE
Dynamic:
  source: entries
  page-size: 10
  empty: '&7No member flags are available.'
  layout: '&e[{entry.state}] &f{entry.name}: &7{entry.description} {toggle-member-flag}'
  width: 520
  buttons:
    toggle-member-flag:
      text: '&a[Toggle]'
      tooltip: '&7Toggle this member flag'
      action-group: toggle-member-flag
Bottom:
  type: multi
  columns: 2
  buttons:
    select-template:
      text: '&aApply Template'
      action-group: select-template
    previous:
      text: '&aPrevious'
      action-group: previous-page
    next:
      text: '&aNext'
      action-group: next-page
    back:
      text: '&cBack to Members'
      action-group: back-member-list
  exit:
    text: '&8Close'
    actions:
      - 'close'
