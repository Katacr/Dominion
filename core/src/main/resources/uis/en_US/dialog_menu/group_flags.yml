schema-version: 1
Title: '&6Group: {route.group.name} {page.current}/{page.total}'
Settings:
  can_escape: true
  after_action: NONE
Dynamic:
  source: entries
  page-size: 10
  empty: '&7No group flags are available.'
  layout: '&e[{entry.state}] &f{entry.name}: &7{entry.description} {toggle-group-flag}'
  width: 520
  buttons:
    toggle-group-flag:
      text: '&a[Toggle]'
      tooltip: '&7Toggle this group flag'
      action-group: toggle-group-flag
Bottom:
  type: multi
  columns: 2
  buttons:
    rename:
      text: '&eRename Group'
      action-group: rename-group
      input-capture:
        title: '&eRename Group'
        body: '&7Enter a new name for this group.'
        input:
          key: group_new_name
          type: input
          text: '&fNew Name'
          default: '{route.group.name}'
          min_length: 1
          max_length: 64
          pattern: '\S+'
        confirm:
          text: '&aSave'
        deny:
          text: '&cCancel'
    previous:
      text: '&aPrevious'
      action-group: previous-page
    next:
      text: '&aNext'
      action-group: next-page
    back:
      text: '&cBack to Groups'
      action-group: back-group-list
  exit:
    text: '&8Close'
    actions:
      - 'close'
