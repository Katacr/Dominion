schema-version: 1

Layout:
  - '&8------------ &6Template Settings &8------------'
  - '&7Template: &f{route.template.name}'
  - '{rename}'
  - '{entries}'
  - '&8------------------------------------'
  - '{previous} &7Page &f{page.current}&7/&f{page.total}&7, &f{page.items} &7items {next}'
  - '{back}'

Buttons:
  entries:
    type: LIST
    source: entries
    rows: 10
    empty: '&7No privilege flags are currently enabled.'
    Layout:
      - '&8- {toggle} &f{entry.name}'
    Buttons:
      toggle:
        type: BUTTON
        text: '&e[{entry.state}]'
        hover: '&f{entry.description}'
        disabled-text: '&8[Unavailable]'
        permission: dominion.default
        action-group: toggle-template-flag

  rename:
    type: BUTTON
    text: '&e[Rename Template]'
    hover: '&7Enter a new template name in chat'
    permission: dominion.default
    action-group: rename-template

  previous:
    type: BUTTON
    text: '&a[Previous]'
    disabled-text: '&8[Previous]'
    action-group: previous-page

  next:
    type: BUTTON
    text: '&a[Next]'
    disabled-text: '&8[Next]'
    action-group: next-page

  back:
    type: BUTTON
    text: '&c[Back to Template List]'
    permission: dominion.default
    action-group: back-template-list
