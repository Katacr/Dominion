schema-version: 1
Layout:
  - '&8------------ &6Language &8------------'
  - '{entries}'
  - '{previous} &7Page &f{page.current}&7/&f{page.total} {next}'
  - '{back}'
Buttons:
  entries:
    type: LIST
    source: entries
    rows: 10
    empty: '&7No menu languages are available.'
    Layout:
      - '&8- {select} &f{entry.name}'
    Buttons:
      select:
        type: BUTTON
        text: '&a[Select]'
        hover: '&7Use &f{entry.name}'
        action-group: select-language
  previous:
    type: BUTTON
    text: '&a[Previous]'
    disabled-text: '&8[Previous]'
    action-group: previous-page
  next:
    type: BUTTON
    text: '&a[Next]'
    disabled-text: '&8[Next]'
    action-group: next-page
  back:
    type: BUTTON
    text: '&c[Back]'
    action-group: back
