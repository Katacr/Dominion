schema-version: 1
Layout:
  - '&8------------ &6Select Player &8------------'
  - '&7Dominion: &f{route.dominion.name}'
  - '{entries}'
  - '{previous} &7Page &f{page.current}&7/&f{page.total} {next}'
  - '{back}'
Buttons:
  entries:
    type: LIST
    source: entries
    rows: 10
    empty: '&7No known players can be added.'
    Layout: ['&8- {add} &f{entry.name}']
    Buttons:
      add:
        type: BUTTON
        text: '&a[Add]'
        action-group: add-member
  previous:
    type: BUTTON
    text: '&a[Previous]'
    disabled-text: '&8[Previous]'
    action-group: previous-page
  next:
    type: BUTTON
    text: '&a[Next]'
    disabled-text: '&8[Next]'
    action-group: next-page
  back:
    type: BUTTON
    text: '&c[Back to Member List]'
    action-group: back-member-list
