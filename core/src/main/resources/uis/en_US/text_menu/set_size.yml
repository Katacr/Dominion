  south-contract:
    type: BUTTON
    text: '&c[Contract]'
    action-group: south-contract
  west-expand:
    type: BUTTON
    text: '&a[Expand]'
    action-group: west-expand
  west-contract:
    type: BUTTON
    text: '&c[Contract]'
    action-group: west-contract
  east-expand:
    type: BUTTON
    text: '&a[Expand]'
    action-group: east-expand
  east-contract:
    type: BUTTON
    text: '&c[Contract]'
    action-group: east-contract
  up-expand:
    type: BUTTON
    text: '&a[Expand]'
    action-group: up-expand
  up-contract:
    type: BUTTON
    text: '&c[Contract]'
    action-group: up-contract
  down-expand:
    type: BUTTON
    text: '&a[Expand]'
