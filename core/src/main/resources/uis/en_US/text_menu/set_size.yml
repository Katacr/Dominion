schema-version: 1
Layout:
  - '&8------------ &6Resize Dominion &8------------'
  - '&7Dominion: &f{route.dominion.name}'
  - '&7North: {north-expand} {north-contract}'
  - '&7South: {south-expand} {south-contract}'
  - '&7West: {west-expand} {west-contract}'
  - '&7East: {east-expand} {east-contract}'
  - '&7Up: {up-expand} {up-contract}'
  - '&7Down: {down-expand} {down-contract}'
  - '{back}'
Buttons:
