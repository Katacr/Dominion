schema-version: 1

Layout:
  - '&8------------ &6Member Settings &8------------'
  - '&7Member: &f{route.member.name} &8| &7Dominion: &f{route.dominion.name}'
  - '{template}'
  - '{entries}'
  - '&8------------------------------------'
  - '{previous} &7Page &f{page.current}&7/&f{page.total}&7, &f{page.items} &7items {next}'
  - '{back}'

Buttons:
  entries:
    type: LIST
    source: entries
    rows: 10
    empty: '&7No editable member privilege flags are currently enabled.'
    Layout:
      - '&8- {toggle} &f{entry.name}'
    Buttons:
      toggle:
        type: BUTTON
        text: '&e[{entry.state}]'
        hover: '&f{entry.description}'
        disabled-text: '&8[Unavailable]'
        permission: dominion.default
        action-group: toggle-member-flag

  template:
    type: BUTTON
    text: '&e[Apply Template]'
    hover: '&7Select a privilege template for this member'
    permission: dominion.default
    action-group: select-template

  previous:
    type: BUTTON
    text: '&a[Previous]'
    disabled-text: '&8[Previous]'
    action-group: previous-page

  next:
    type: BUTTON
    text: '&a[Next]'
    disabled-text: '&8[Next]'
    action-group: next-page

  back:
    type: BUTTON
    text: '&c[Back to Member List]'
    permission: dominion.default
    action-group: back-member-list
