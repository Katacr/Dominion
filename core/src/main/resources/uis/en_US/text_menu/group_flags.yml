schema-version: 1

Layout:
  - '&8------------ &6Group Settings &8------------'
  - '&7Group: &f{route.group.name} &8| &7Dominion: &f{route.dominion.name}'
  - '{rename}'
  - '{entries}'
  - '&8------------------------------------'
  - '{previous} &7Page &f{page.current}&7/&f{page.total}&7, &f{page.items} &7items {next}'
  - '{back}'

Buttons:
  entries:
    type: LIST
    source: entries
    rows: 10
    empty: '&7No editable group privilege flags are currently enabled.'
    Layout:
      - '&8- {toggle} &f{entry.name}'
    Buttons:
      toggle:
        type: BUTTON
        text: '&e[{entry.state}]'
        hover: '&f{entry.description}'
        disabled-text: '&8[Unavailable]'
        permission: dominion.default
        action-group: toggle-group-flag
  rename:
    type: BUTTON
    text: '&e[Rename Group]'
    hover: '&7Enter a new group name in chat'
    permission: dominion.default
    action-group: rename-group
  previous:
    type: BUTTON
    text: '&a[Previous]'
    disabled-text: '&8[Previous]'
    action-group: previous-page
  next:
    type: BUTTON
    text: '&a[Next]'
    disabled-text: '&8[Next]'
    action-group: next-page
  back:
    type: BUTTON
    text: '&c[Back to Group List]'
    permission: dominion.default
    action-group: back-group-list
