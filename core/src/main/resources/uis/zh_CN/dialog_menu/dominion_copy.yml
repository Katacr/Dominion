schema-version: 1
Title: '&6选择复制来源 {page.current}/{page.total}'
Settings:
  can_escape: true
  after_action: NONE
Dynamic:
  source: entries
  page-size: 12
  empty: '&7暂无可用的来源领地。'
  layout: '&f{entry.name} {copy}'
  width: 420
  buttons:
    copy:
      text: '&a[复制]'
      action-group: copy
Bottom:
  type: multi
  columns: 2
  buttons:
    previous:
      text: '&a上一页'
      action-group: previous-page
    next:
      text: '&a下一页'
      action-group: next-page
    back:
      text: '&c返回复制菜单'
      action-group: back
  exit:
    text: '&8关闭'
    actions:
      - 'close'
