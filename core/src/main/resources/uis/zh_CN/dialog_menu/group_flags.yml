schema-version: 1
Title: '&6权限组：{route.group.name} {page.current}/{page.total}'
Settings:
  can_escape: true
  after_action: NONE
Dynamic:
  source: entries
  page-size: 10
  empty: '&7当前没有可配置的权限。'
  layout: '&e[{entry.state}] &f{entry.name}: &7{entry.description} {toggle-group-flag}'
  width: 520
  buttons:
    toggle-group-flag:
      text: '&a[切换]'
      tooltip: '&7切换该权限组权限'
      action-group: toggle-group-flag
Bottom:
  type: multi
  columns: 2
  buttons:
    rename:
      text: '&e重命名权限组'
      action-group: rename-group
      input-capture:
        title: '&e重命名权限组'
        body: '&7输入权限组的新名称。'
        input:
          key: group_new_name
          type: input
          text: '&f新名称'
          default: '{route.group.name}'
          min_length: 1
          max_length: 64
          pattern: '\S+'
        confirm:
          text: '&a保存'
        deny:
          text: '&c取消'
    previous:
      text: '&a上一页'
      action-group: previous-page
    next:
      text: '&a下一页'
      action-group: next-page
    back:
      text: '&c返回权限组列表'
      action-group: back-group-list
  exit:
    text: '&8关闭'
    actions:
      - 'close'
