schema-version: 1
Title: '&6模板：{route.template.name} {page.current}/{page.total}'
Settings:
  can_escape: true
  after_action: NONE
Dynamic:
  source: entries
  page-size: 10
  empty: '&7当前没有可配置的模板权限。'
  layout: '&e[{entry.state}] &f{entry.name}: &7{entry.description} {toggle-template-flag}'
  width: 520
  buttons:
    toggle-template-flag:
      text: '&a[切换]'
      tooltip: '&7切换该模板权限'
      action-group: toggle-template-flag
Bottom:
  type: multi
  columns: 2
  buttons:
    rename:
      text: '&e重命名模板'
      action-group: rename-template
      input-capture:
        title: '&e重命名模板'
        body: '&7输入模板的新名称。'
        input:
          key: template_new_name
          type: input
          text: '&f新名称'
          default: '{route.template.name}'
          min_length: 1
          max_length: 64
          pattern: '\S+'
        confirm:
          text: '&a保存'
        deny:
          text: '&c取消'
    previous:
      text: '&a上一页'
      action-group: previous-page
    next:
      text: '&a下一页'
      action-group: next-page
    back:
      text: '&c返回模板列表'
      action-group: back-template-list
  exit:
    text: '&8关闭'
    actions:
      - 'close'
