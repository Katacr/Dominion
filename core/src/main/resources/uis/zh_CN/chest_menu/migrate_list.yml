schema-version: 1
Title: '&0从 Residence 迁移'
Layout:
  - '#a#######'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  'a':
    capability: residence-migration
    permission: dominion.admin
    hidden-when-disabled: true
    Display:
      material: DIAMOND
      name: '&c迁移全部领地'
    Clicks:
      left:
        action-group: migrate-all
  'e':
    source: entries
    capability: residence-migration
    Display:
      material: PAPER
      name: '&f{entry.prefix}{entry.name}'
      lore:
        - '&7所有者：{entry.owner}'
        - '&e点击迁移该 Residence 领地'
    Empty-Display:
      material: BARRIER
      name: '&7没有可迁移的 Residence 数据。'
    Clicks:
      left:
        action-group: migrate-residence
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a上一页'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&c返回主菜单'
    Clicks:
      left:
        action-group: back-main
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a下一页'
    Clicks:
      left:
        action-group: next-page
