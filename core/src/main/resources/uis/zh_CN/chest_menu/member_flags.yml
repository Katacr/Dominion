schema-version: 1
Title: '&0成员权限：{route.member.name}'
Layout:
  - '#t#######'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  't':
    Display:
      material: WRITABLE_BOOK
      name: '&a应用模板'
    Clicks:
      left:
        action-group: select-template
  'e':
    source: entries
    Display:
      material: '{entry.material}'
      name: '&e[{entry.state}] &f{entry.name}'
      lore:
        - '&7{entry.description}'
        - '&e点击切换状态'
    Empty-Display:
      material: BARRIER
      name: '&7当前没有已启用的成员权限。'
    Clicks:
      left:
        action-group: toggle-member-flag
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a上一页'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&c返回成员列表'
    Clicks:
      left:
        action-group: back-member-list
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a下一页'
    Clicks:
      left:
        action-group: next-page
