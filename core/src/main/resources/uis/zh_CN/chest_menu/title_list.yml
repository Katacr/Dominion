schema-version: 1
Title: '&0权限组称号'
Layout:
  - '#########'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  'e':
    source: entries
    capability: group-title
    hidden-when-disabled: true
    Display:
      material: NAME_TAG
      name: '&e[{entry.state}] &f{entry.name}'
      lore:
        - '&7领地：{entry.dominion}'
        - '&e点击切换称号'
    Empty-Display:
      material: BARRIER
      name: '&7暂无可用的权限组称号。'
    Clicks:
      left:
        action-group: toggle-title
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a上一页'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&c返回主菜单'
    Clicks:
      left:
        action-group: back
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a下一页'
    Clicks:
      left:
        action-group: next-page
