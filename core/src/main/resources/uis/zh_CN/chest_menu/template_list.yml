schema-version: 1
Title: '&0权限模板'
Layout:
  - '#c#######'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  'c':
    Display:
      material: LIME_DYE
      name: '&a创建模板'
    Clicks:
      left:
        action-group: create-template
  'e':
    source: entries
    Display:
      material: WRITABLE_BOOK
      name: '&f{entry.name}'
      lore:
        - '&e左键：管理'
        - '&cShift+左键：删除'
    Empty-Display:
      material: BARRIER
      name: '&7你还没有权限模板。'
    Clicks:
      left:
        action-group: open-template
      shift-left:
        action-group: delete-template
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a上一页'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&c返回主菜单'
    Clicks:
      left:
        action-group: back-main-menu
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a下一页'
    Clicks:
      left:
        action-group: next-page
