schema-version: 1
Title: '&0权限组：{route.group.name}'
Layout:
  - '#f#a#r#d#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#########'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  'f':
    Display:
      material: COMPARATOR
      name: '&a权限设置'
    Clicks:
      left:
        action-group: group-flags
  'a':
    Display:
      material: LIME_DYE
      name: '&a添加成员'
    Clicks:
      left:
        action-group: select-member
  'r':
    Display:
      material: NAME_TAG
      name: '&e重命名权限组'
    Clicks:
      left:
        action-group: rename-group
  'd':
    Display:
      material: RED_DYE
      name: '&c删除权限组'
    Clicks:
      left:
        action-group: delete-group
  'e':
    source: entries
    Display:
      material: PLAYER_HEAD
      name: '&f{entry.name}'
      lore:
        - '&c点击移出权限组'
    Empty-Display:
      material: BARRIER
      name: '&7该权限组暂无成员。'
    Clicks:
      left:
        action-group: remove-group-member
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a上一页'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&c返回权限组列表'
    Clicks:
      left:
        action-group: back-group-list
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a下一页'
    Clicks:
      left:
        action-group: next-page
