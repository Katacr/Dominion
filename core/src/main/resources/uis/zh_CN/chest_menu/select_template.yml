schema-version: 1
Title: '&0选择模板：{route.member.name}'
Layout:
  - '#########'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  'e':
    source: entries
    Display:
      material: WRITABLE_BOOK
      name: '&f{entry.name}'
      lore:
        - '&e点击应用模板'
    Empty-Display:
      material: BARRIER
      name: '&7暂无可用模板。'
    Clicks:
      left:
        action-group: apply-template
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a上一页'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&c返回成员权限'
    Clicks:
      left:
        action-group: back-member-flags
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a下一页'
    Clicks:
      left:
        action-group: next-page
