schema-version: 1
Title: '&0权限组：{route.dominion.name}'
Layout:
  - '#c#######'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  'c':
    Display:
      material: LIME_DYE
      name: '&a创建权限组'
    Clicks:
      left:
        action-group: create-group
  'e':
    source: entries
    Display:
      material: CHEST
      name: '&f{entry.name}'
      lore:
        - '&7成员数：{entry.members}'
        - '&e左键：管理'
        - '&cShift+左键：删除'
    Empty-Display:
      material: BARRIER
      name: '&7暂无权限组。'
    Clicks:
      left:
        action-group: open-group
      shift-left:
        action-group: delete-group
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a上一页'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&c返回领地管理'
    Clicks:
      left:
        action-group: back-dominion-manage
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a下一页'
    Clicks:
      left:
        action-group: next-page
