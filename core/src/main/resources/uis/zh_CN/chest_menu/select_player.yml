schema-version: 1
Title: '&0添加成员：{route.dominion.name}'
Layout:
  - '#########'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  'e':
    source: entries
    Display:
      material: PLAYER_HEAD
      name: '&f{entry.name}'
      lore:
        - '&e点击添加成员'
    Empty-Display:
      material: BARRIER
      name: '&7暂无可添加的玩家。'
    Clicks:
      left:
        action-group: add-member
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a上一页'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&c返回成员列表'
    Clicks:
      left:
        action-group: back-member-list
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a下一页'
    Clicks:
      left:
        action-group: next-page
