schema-version: 1
Title: '&0成员：{route.dominion.name}'
Layout:
  - '#a#######'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  'a':
    Display:
      material: LIME_DYE
      name: '&a添加成员'
    Clicks:
      left:
        action-group: add-member
  'e':
    source: entries
    Display:
      material: PLAYER_HEAD
      name: '&f{entry.name} {entry.tag}'
      lore:
        - '&7权限组：{entry.group}'
        - '&e左键：权限设置'
        - '&cShift+左键：移除'
    Empty-Display:
      material: BARRIER
      name: '&7该领地暂无成员。'
    Clicks:
      left:
        action-group: open-member-flags
      shift-left:
        action-group: remove-member
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a上一页'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&c返回领地管理'
    Clicks:
      left:
        action-group: back-dominion-manage
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a下一页'
    Clicks:
      left:
        action-group: next-page
