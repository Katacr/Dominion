schema-version: 1
Title: '&0添加权限组成员：{route.group.name}'
Layout:
  - '#########'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  'e':
    source: entries
    Display:
      material: PLAYER_HEAD
      name: '&f{entry.name}'
      lore:
        - '&e点击加入权限组'
    Empty-Display:
      material: BARRIER
      name: '&7暂无未分组成员。'
    Clicks:
      left:
        action-group: add-member
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a上一页'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&c返回权限组管理'
    Clicks:
      left:
        action-group: back-group-manage
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a下一页'
    Clicks:
      left:
        action-group: next-page
