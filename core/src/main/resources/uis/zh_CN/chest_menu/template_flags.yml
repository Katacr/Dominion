schema-version: 1
Title: '&0模板：{route.template.name}'
Layout:
  - '#r#######'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#eeeeeee#'
  - '#p##b##n#'
Buttons:
  '#':
    Display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  'r':
    Display:
      material: NAME_TAG
      name: '&e重命名模板'
    Clicks:
      left:
        action-group: rename-template
  'e':
    source: entries
    Display:
      material: '{entry.material}'
      name: '&e[{entry.state}] &f{entry.name}'
      lore:
        - '&7{entry.description}'
        - '&e点击切换状态'
    Empty-Display:
      material: BARRIER
      name: '&7当前没有已启用的模板权限。'
    Clicks:
      left:
        action-group: toggle-template-flag
  'p':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a上一页'
    Clicks:
      left:
        action-group: previous-page
  'b':
    Display:
      material: OAK_DOOR
      name: '&c返回模板列表'
    Clicks:
      left:
        action-group: back-template-list
  'n':
    hidden-when-disabled: true
    Display:
      material: ARROW
      name: '&a下一页'
    Clicks:
      left:
        action-group: next-page
