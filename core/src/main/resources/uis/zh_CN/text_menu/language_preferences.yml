schema-version: 1
Layout:
  - '&8------------ &6语言 &8------------'
  - '{entries}'
  - '{previous} &7第 &f{page.current}&7/&f{page.total} &7页 {next}'
  - '{back}'
Buttons:
  entries:
    type: LIST
    source: entries
    rows: 10
    empty: '&7暂无可用的菜单语言。'
    Layout:
      - '&8- {select} &f{entry.name}'
    Buttons:
      select:
        type: BUTTON
        text: '&a[选择]'
        hover: '&7使用 &f{entry.name}'
        action-group: select-language
  previous:
    type: BUTTON
    text: '&a[上一页]'
    disabled-text: '&8[上一页]'
    action-group: previous-page
  next:
    type: BUTTON
    text: '&a[下一页]'
    disabled-text: '&8[下一页]'
    action-group: next-page
  back:
    type: BUTTON
    text: '&c[返回]'
    action-group: back
