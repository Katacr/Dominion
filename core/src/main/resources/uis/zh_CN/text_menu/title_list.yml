schema-version: 1
Layout:
  - '&8------------ &6权限组称号 &8------------'
  - '{entries}'
  - '{previous} &7第 &f{page.current}&7/&f{page.total} &7页 {next}'
  - '{back}'
Buttons:
  entries:
    type: LIST
    source: entries
    rows: 10
    empty: '&7暂无可用的权限组称号。'
    Layout: ['&8- {toggle} &f{entry.name} &7- {entry.dominion} &e[{entry.state}]']
    Buttons:
      toggle:
        type: BUTTON
        text: '&a[使用/取消]'
        action-group: toggle-title
  previous:
    type: BUTTON
    text: '&a[上一页]'
    disabled-text: '&8[上一页]'
    action-group: previous-page
  next:
    type: BUTTON
    text: '&a[下一页]'
    disabled-text: '&8[下一页]'
    action-group: next-page
  back:
    type: BUTTON
    text: '&c[返回主菜单]'
    action-group: back
